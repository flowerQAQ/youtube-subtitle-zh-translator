<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Caption ZH Translator</title>
  </head>
  <body>
    <main class="popup-shell">
      <header>
        <div>
          <h1>YouTube 字幕翻译</h1>
          <p>DeepSeek / Xiaomi MiMo Token Plan</p>
        </div>
        <span id="save-status"></span>
      </header>

      <form id="settings-form" class="panel">
        <label>
          <span>翻译引擎</span>
          <select id="translation-provider">
            <option value="deepseek">DeepSeek deepseek-v4-flash</option>
            <option value="xiaomi-mimo">Xiaomi MiMo mimo-v2.5</option>
          </select>
        </label>

        <label>
          <span>DeepSeek API Key</span>
          <input id="deepseek-api-key" type="password" autocomplete="off" placeholder="sk-..." />
        </label>

        <label>
          <span>Xiaomi MiMo API Key</span>
          <input id="mimo-api-key" type="password" autocomplete="off" placeholder="mimo-..." />
        </label>

        <div class="grid-2">
          <label>
            <span>显示模式</span>
            <select id="display-mode">
              <option value="bilingual">双语</option>
              <option value="zh">只显示中文</option>
              <option value="off">关闭</option>
            </select>
          </label>
          <label>
            <span>源语言</span>
            <select id="source-language">
              <option value="">自动</option>
            </select>
          </label>
        </div>

        <label>
          <span>字号</span>
          <input id="font-scale" type="range" min="0.75" max="1.8" step="0.05" />
        </label>
        <label>
          <span>字幕底部距离</span>
          <input id="vertical-offset" type="range" min="48" max="180" step="4" />
        </label>

        <button type="submit">保存并刷新字幕</button>
      </form>

      <section class="panel debug-panel">
        <div class="section-title">
          <h2>调试信息</h2>
          <button id="refresh-debug" type="button">刷新</button>
        </div>
        <dl id="debug-summary"></dl>
        <details>
          <summary>原始调试 JSON</summary>
          <pre id="debug-json"></pre>
        </details>
      </section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
